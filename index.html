<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compositions</title>

<style>
.audio-block {
  margin-top: 10px;
  padding: 10px;
  background: #f8f2e8;
  border-radius: 6px;
}
.audio-block p {
  margin: 0 0 6px 0;
  font-size: 0.9em;
  color: var(--gold-light);
}

/* ✅ NEW: Raga tag */
.raga-tag {
  display:inline-block;
  margin-top:6px;
  padding:2px 8px;
  font-size:0.75em;
  border:1px solid var(--border-light);
  border-radius:4px;
  background:#fdf6ec;
  color: var(--gold-light);
  cursor:pointer;
}

/* ✅ Shared design system */
:root {
  --bg: #ffffff;
  --border: #d4c5a9;
  --border-light: #c0aa88;
  --gold: #8b5e1a;
  --gold-light: #6b4510;
  --gold-dim: #a0783a;
  --text: #1a1208;
  --meta: #8a7055;
  --section-bg: #fdf9f3;
  --header-bg: #f5ede0;
}

/* Reset */
* { box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans Kannada', system-ui, Arial, sans-serif;
  max-width: 900px;
  margin: 40px auto;
  padding: 0 20px;
  font-size: 16px;
  line-height: 1.6;
}

/* Title */
.title-area {
  max-width:700px;
  margin: 0 auto 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.page-title {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  letter-spacing: 0.2em;
  color: var(--gold);
  text-transform: uppercase;
}

.page-subtitle {
  font-family: 'Noto Serif Kannada', serif;
  font-size: 0.9em;
  color: var(--gold-dim);
}

.intro {
  max-width:700px;
  margin: 15px auto 20px;
}

/* ✅ Updated label */
.helper-text {
  font-size:0.8em;
  color: var(--meta);
  max-width:700px;
  margin: 0 auto 8px;
}

/* Controls */
.controls {
  max-width:700px;
  margin: 10px auto 25px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--section-bg);
}

/* Inputs */
select {
  padding:8px 10px;
  font-size: 0.9em;
  border:1px solid var(--border-light);
  background:white;
}

/* Button */
button {
  padding:8px 10px;
  border:1px solid var(--border-light);
  background:white;
  cursor:pointer;
  border-radius:4px;
}
button:hover {
  background:#f8f2e8;
}

/* Sections */
details {
  margin:20px 0;
  border:1px solid var(--border);
  border-radius:6px;
  background: var(--section-bg);
}

/* Section header */
summary {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  color: var(--gold);
  text-transform: uppercase;
  background: var(--header-bg);
  padding: 8px 10px;
  cursor: pointer;
}

.comp {
  margin:10px 0;
  padding:10px 12px;
}

.comp:hover {
  background:#f8f2e8;
}

.meta {
  font-size:0.85em;
  color: var(--meta);
}

/* Links */
a {
  text-decoration:none;
  color: var(--gold-light);
}
a:hover {
  text-decoration:underline;
}

/* Audio */
.play-btn {
  margin-top:5px;
}

.audio {
  display:none;
  margin-top:10px;
}

iframe {
  width:100%;
  max-width:500px;
  height:280px;
}

footer {
  text-align:center;
  color: var(--meta);
  margin-top:30px;
  font-size:0.85em;
}
</style>
</head>

<body>

<div class="title-area">
  <div class="page-title">Composition Archive</div>
  <div class="page-subtitle">
    A curated archive of original compositions
  </div>
</div>

<p class="intro">
This archive presents a collection of compositions across forms such as geete, varṇa and kriti.
</p>

<p class="helper-text">
Browse the collection:
</p>

<div class="controls">
  <select id="typeFilter">
    <option value="all">All</option>
    <option value="geete">Geete</option>
    <option value="swarajati">Swarajati</option>
    <option value="varna">Varna</option>
    <option value="kriti">Kriti</option>
    <option value="pada">Pada</option>
    <option value="others">Others</option>
  </select>
</div>

<div id="archive"></div>

<footer>Hosted on GitHub Pages</footer>

<script>

const DATA = /* ✅ KEEP YOUR ORIGINAL DATA HERE EXACTLY */ ;

/* ✅ TYPES unchanged */
const TYPES = ["geete","swarajati","varna","kriti","pada","others"];

function render() {
  let container = document.getElementById("archive");
  container.innerHTML = "";

  TYPES.forEach(type => {
    let section = document.createElement("details");
    if (type === "varna") section.open = true;

    let summary = document.createElement("summary");
    summary.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    section.appendChild(summary);

    let filtered = DATA.filter(c => c.type === type);

    filtered.forEach(c => {
      let div = document.createElement("div");
      div.className = "comp";

      div.dataset.type = c.type;
      div.dataset.raga = (c.raga || "").toLowerCase();

      div.innerHTML = `
        <a href="${c.file}">${c.title}</a>
        <div class="meta">
          ${c.raga ? "Rāga: " + c.raga : ""}
          ${c.tala ? " | Tāla: " + c.tala : ""}
        </div>
        ${c.raga ? `<div class="raga-tag" data-raga="${c.raga.toLowerCase()}">${c.raga}</div>` : ""}
      `;

/* ✅ YouTube logic UNCHANGED */
if (c.youtube) {
  c.youtube.forEach(v => {
    let btn = document.createElement("button");
    btn.className = "play-btn";
    btn.textContent = "▶ " + v.label;

    let audio = document.createElement("div");
    audio.className = "audio";

    let iframe = document.createElement("iframe");
    iframe.dataset.src = "https://www.youtube.com/embed/" + v.id;
    audio.appendChild(iframe);

    btn.onclick = () => {
      document.querySelectorAll(".audio").forEach(a => {
        a.style.display = "none";
        let f = a.querySelector("iframe");
        if (f) f.src = "";
      });

      audio.style.display = "block";
      iframe.src = iframe.dataset.src;
    };

    div.appendChild(btn);
    div.appendChild(audio);
  });
}

/* ✅ Audio logic UNCHANGED */
if (c.audio) {
  c.audio.forEach(a => {
    let block = document.createElement("div");
    block.className = "audio-block";
    block.innerHTML = `
      <p>${a.label}</p>
      <audio controls>
        <source src="${a.url}" type="audio/mpeg">
      </audio>
    `;
    div.appendChild(block);
  });
}

      section.appendChild(div);
    });

    container.appendChild(section);
  });
}

/* ✅ Type filter only */
document.getElementById("typeFilter").addEventListener("change", () => {
  let t = document.getElementById("typeFilter").value;

  document.querySelectorAll(".comp").forEach(c => {
    c.style.display = (t === "all" || c.dataset.type === t)
      ? "block" : "none";
  });

  document.querySelectorAll("details").forEach(section => {
    let visible = section.querySelector(".comp[style*='block']");
    if (visible) {
      section.style.display = "block";
      section.open = true;
    } else {
      section.style.display = "none";
    }
  });
});

/* ✅ Raga click filter */
document.addEventListener("click", e => {
  if (e.target.classList.contains("raga-tag")) {

    let r = e.target.dataset.raga;

    document.querySelectorAll(".comp").forEach(c => {
      c.style.display = (c.dataset.raga === r) ? "block" : "none";
    });

    document.querySelectorAll("details").forEach(section => {
      let visible = section.querySelector(".comp[style*='block']");
      if (visible) {
        section.style.display = "block";
        section.open = true;
      } else {
        section.style.display = "none";
      }
    });

    document.getElementById("typeFilter").value = "all";
  }
});

render();

</script>

</body>
</html>
