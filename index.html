<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compositions</title>

<style>

:root {
  --bg: #ffffff;
  --border: #d4c5a9;
  --border-light: #c0aa88;
  --gold: #8b5e1a;
  --gold-light: #6b4510;
  --gold-dim: #a0783a;
  --text: #1a1208;
  --meta: #8a7055;
  --section-bg: #fdf9f3;
  --header-bg: #f5ede0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans Kannada', system-ui, Arial, sans-serif;
  max-width: 900px;
  margin: 40px auto;
  padding: 0 20px;
  line-height: 1.6;
}

/* Title */
.title-area {
  text-align:center;
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
}

.page-title {
  font-family:'Cinzel', serif;
  letter-spacing:0.2em;
  color: var(--gold);
  font-size:1rem;
  text-transform:uppercase;
}

.page-subtitle {
  font-size:0.9em;
  color: var(--gold-dim);
}

/* Intro */
.intro {
  margin: 20px auto;
  max-width: 700px;
}

/* Controls */
.controls {
  margin: 20px auto;
  padding: 12px;
  border: 1px solid var(--border);
  background: var(--section-bg);
  max-width: 700px;
}

select {
  padding:6px 8px;
  border:1px solid var(--border-light);
}

/* Sections */
details {
  margin:20px 0;
  border:1px solid var(--border);
  background: var(--section-bg);
  border-radius:6px;
}

summary {
  font-family:'Cinzel', serif;
  font-size:0.75rem;
  letter-spacing:0.3em;
  color: var(--gold);
  padding:8px 10px;
  cursor:pointer;
  background: var(--header-bg);
}

/* Items */
.comp {
  padding:10px 12px;
}

.comp:hover {
  background:#f8f2e8;
}

.meta {
  font-size:0.85em;
  color: var(--meta);
}

/* Links */
a {
  text-decoration:none;
  color: var(--gold-light);
}
a:hover {
  text-decoration:underline;
}

/* ✅ Raga tag */
.raga-tag {
  display:inline-block;
  margin-top:6px;
  padding:2px 8px;
  font-size:0.75em;
  border:1px solid var(--border-light);
  border-radius:4px;
  background:#fdf6ec;
  color: var(--gold-light);
}

/* Audio */
.play-btn {
  margin-top:6px;
}

.audio {
  display:none;
  margin-top:10px;
}

iframe {
  width:100%;
  max-width:500px;
  height:280px;
}

/* Footer */
footer {
  text-align:center;
  margin-top:30px;
  color: var(--meta);
  font-size:0.85em;
}

</style>
</head>

<body>

<div class="title-area">
  <div class="page-title">Composition Archive</div>
  <div class="page-subtitle">Carnatic Compositions</div>
</div>

<p class="intro">
A curated collection of original compositions across geete, varṇa, kriti and related forms.  
Each entry includes notation and, where available, audio renderings.
</p>

<!-- ✅ Type filter only -->
<div class="controls">
  <label>Filter by type:</label>
  <select id="typeFilter">
    <option value="all">All</option>
    <option value="geete">Geete</option>
    <option value="swarajati">Swarajati</option>
    <option value="varna">Varna</option>
    <option value="kriti">Kriti</option>
    <option value="others">Others</option>
  </select>
</div>

<div id="archive"></div>

<footer>Hosted on GitHub Pages</footer>

<script>

/* ✅ DATA */

const DATA = [
  {
    type:"geete",
    title:"Sanchāri Geete — Vasanta",
    file:"vasanta_geete_1.html",
    raga:"Vasanta",
    tala:"Trisra Triputa"
  },
  {
    type:"geete",
    title:"Sanchāri Geete — Kīravāni",
    file:"keeravani_geete_2.html",
    raga:"Kīravāni",
    tala:"Rupaka"
  },
  {
    type:"varna",
    title:"Pada Varṇa — Hindola",
    file:"pada_varna_hindola_RamaprasadKV_Final.html",
    raga:"Hindola",
    tala:"Adi"
  },
  {
    type:"varna",
    title:"Rāgamālikā Tāna Varṇa",
    file:"kalyanimalikavarnam_final.html",
    raga:"Rāgamālikā",
    tala:"Adi"
  },
  {
    type:"swarajati",
    title:"Mohana Swarajati",
    file:"mohana_swarajati.html",
    raga:"Mohana",
    tala:"Adi"
  },
  {
    type:"kriti",
    title:"Kriti — Mohanāngi",
    file:"hottu_muluguta_mohanagi_4.html",
    raga:"Mohanāngi",
    tala:"Misra Chapu"
  }
];

const TYPES = ["geete","swarajati","varna","kriti","others"];

/* ✅ Render */

function render() {
  let container = document.getElementById("archive");
  container.innerHTML = "";

  TYPES.forEach(type => {
    let section = document.createElement("details");
    if (type === "varna") section.open = true;

    let summary = document.createElement("summary");
    summary.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    section.appendChild(summary);

    let items = DATA.filter(c => c.type === type);

    items.forEach(c => {
      let div = document.createElement("div");
      div.className = "comp";

      div.dataset.type = c.type;

      div.innerHTML = `
        <a href="${c.file}">${c.title}</a>
        <div class="meta">
          ${c.raga ? "Rāga: " + c.raga : ""}
          ${c.tala ? " | Tāla: " + c.tala : ""}
        </div>
        ${c.raga ? `<div class="raga-tag">${c.raga}</div>` : ""}
      `;

      section.appendChild(div);
    });

    container.appendChild(section);
  });
}

/* ✅ Type filter only */

document.getElementById("typeFilter").addEventListener("change", () => {
  let t = document.getElementById("typeFilter").value;

  document.querySelectorAll(".comp").forEach(c => {
    c.style.display = (t === "all" || c.dataset.type === t)
      ? "block"
      : "none";
  });

  document.querySelectorAll("details").forEach(section => {
    let visible = section.querySelector(".comp[style*='block']");
    section.style.display = visible ? "block" : "none";
  });
});

render();

</script>

</body>
</html>
