<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compositions</title>

<style>
.audio-block {
  margin-top: 10px;
  padding: 10px;
  background: #f8f2e8;
  border-radius: 6px;
}
.audio-block p {
  margin: 0 0 6px 0;
  font-size: 0.9em;
  color: var(--gold-light);
}

/* ✅ Raga tag */
.raga-tag {
  display:inline-block;
  margin-top:6px;
  padding:2px 8px;
  font-size:0.75em;
  border:1px solid var(--border-light);
  border-radius:4px;
  background:#fdf6ec;
  color: var(--gold-light);
  cursor:pointer;
}

/* Theme */
:root {
  --bg: #ffffff;
  --border: #d4c5a9;
  --border-light: #c0aa88;
  --gold: #8b5e1a;
  --gold-light: #6b4510;
  --gold-dim: #a0783a;
  --text: #1a1208;
  --meta: #8a7055;
  --section-bg: #fdf9f3;
  --header-bg: #f5ede0;
}

* { box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans Kannada', system-ui, Arial, sans-serif;
  max-width: 900px;
  margin: 40px auto;
  padding: 0 20px;
}

/* Title */
.title-area {
  max-width:700px;
  margin: 0 auto 12px;
  border-bottom: 1px solid var(--border);
}

.page-title {
  font-family: 'Cinzel', serif;
  letter-spacing: 0.2em;
  color: var(--gold);
}

/* Controls */
.controls {
  max-width:700px;
  margin: 10px auto 25px;
  padding: 12px;
  border: 1px solid var(--border);
  background: var(--section-bg);
}

select {
  padding:8px;
}

/* Sections */
details {
  margin:20px 0;
  border:1px solid var(--border);
  background: var(--section-bg);
}

summary {
  font-family:'Cinzel', serif;
  font-size:0.7rem;
  letter-spacing:0.35em;
  color: var(--gold);
  padding:8px;
}

/* Items */
.comp {
  padding:10px 12px;
}
.comp:hover { background:#f8f2e8; }

.meta {
  font-size:0.85em;
  color: var(--meta);
}

a { color: var(--gold-light); text-decoration:none; }

/* Audio */
.play-btn { margin-top:5px; }

.audio {
  display:none;
  margin-top:10px;
}

iframe {
  width:100%;
  max-width:500px;
  height:280px;
}

footer {
  text-align:center;
  margin-top:30px;
  color: var(--meta);
}
</style>
</head>

<body>

<div class="title-area">
  <div class="page-title">Composition Archive</div>
</div>

<div class="controls">
  <select id="typeFilter">
    <option value="all">All</option>
    <option value="geete">Geete</option>
    <option value="swarajati">Swarajati</option>
    <option value="varna">Varna</option>
    <option value="kriti">Kriti</option>
    <option value="pada">Pada</option>
    <option value="others">Others</option>
  </select>
</div>

<div id="archive"></div>

<footer>Hosted on GitHub Pages</footer>

<script>

/* ✅ YOUR ORIGINAL DATA — UNCHANGED */
const DATA = [
{
  type:"geete",
  title:"Sanchāri Geete — Vasanta",
  file:"vasanta_geete_1.html",
  raga:"Vasanta",
  tala:"Trisra Triputa",
  youtube: [{ label: "Vocal Version", id: "uLIQ2RrxBhg" }]
},
{
  type:"geete",
  title:"Sanchāri Geete — Kīravāni",
  file:"keeravani_geete_2.html",
  raga:"Kīravāni",
  tala:"Rupaka"
},
{
  type:"geete",
  title:"Sanchāri Geete — Shankarābharana",
  file:"shankarabharana_geete_2.html",
  raga:"Shankarābharana",
  tala:"Trishra Triputa",
  youtube: [{ label: "Student Rendition", id: "YN48t9ObHeg" }]
},
{
  type:"varna",
  title:"Pada Varṇa — Hindola",
  file:"pada_varna_hindola_RamaprasadKV_Final.html",
  raga:"Hindola",
  tala:"Adi"
},
{
  type:"varna",
  title:"Tana Varṇa — Navaraga Malika",
  file:"tyagaraja_navaraga_malika_varna_8.html",
  raga:"Ragamalika",
  tala:"Adi",
  youtube: [
    { label: "Vidushi Bhama Krishnan", id: "uLIQ2RrxBhg" },
    { label: "Vidushi Ragini Sanath", id: "bIs4xYKd_zM" },
    { label: "Vidushi Uma Kumar", id: "z6wMjn4AEyE" },
    { label: "Full Lesson Version", id: "fY4aq7DfFaM" }
  ]
},
{
  type:"varna",
  title:"Rāgamālikā Tāna Varṇa",
  file:"kalyanimalikavarnam_final.html",
  raga:"Rāgamālikā",
  tala:"Adi",
  youtube: [
    { label: "Class recording", id:"PKdSBS_cGSk"},
    { label: "Vid. Vijay Kannan (Flute)", id:"TJWSctBE2ug"},
    { label: "Vocal version", id:"VGFLE6lyL3M"}
  ]
},
{
  type:"swarajati",
  title:"Mohana Swarajati",
  file:"mohana_swarajati.html",
  raga:"Mohana",
  tala:"Adi",
  youtube: [{ label: "Vidushi Jyothi Chetan", id: "uzZKlfuSuAQ" }]
},
{
  type:"varna",
  title:"Rāgeshri Tāna Varṇa",
  file:"rageshri_varna_8.html",
  raga:"Rāgeshri",
  tala:"Adi",
  youtube: [{ label: "Vidushi Jayanthi Umesh", id: "soUIyuwXs9Y" }]
},
{
  type:"kriti",
  title:"Kriti — Mohanāngi",
  file:"hottu_muluguta_mohanagi_4.html",
  raga:"Mohanāngi",
  tala:"Misra Chapu"
},
{
  type:"others",
  title:"Rāgamālikā Puṣpāñjali",
  file:"ragamalika_pushpanjali_3.html",
  tala:"Adi"
},
{
  type: "kriti",
  title: "Kriti — Udayaravichandrika",
  file: "udayaravichandrika_misrachapu.html",
  raga: "Udayaravichandrika",
  tala: "Misra Chapu"
}
];

const TYPES = ["geete","swarajati","varna","kriti","pada","others"];

function render() {
  let container = document.getElementById("archive");
  container.innerHTML = "";

  TYPES.forEach(type => {
    let section = document.createElement("details");
    if (type==="varna") section.open=true;

    let summary=document.createElement("summary");
    summary.textContent=type.toUpperCase();
    section.appendChild(summary);

    DATA.filter(c=>c.type===type).forEach(c=>{
      let div=document.createElement("div");
      div.className="comp";

      div.dataset.type=c.type;
      div.dataset.raga=(c.raga||"").toLowerCase();

      div.innerHTML=`
        <a href="${c.file}">${c.title}</a>
        <div class="meta">
          ${c.raga ? "Rāga: "+c.raga : ""}
          ${c.tala ? " | Tāla: "+c.tala : ""}
        </div>
        ${c.raga ? `<div class="raga-tag" data-raga="${c.raga.toLowerCase()}">${c.raga}</div>` : ""}
      `;

/* ✅ YouTube unchanged */
if (c.youtube) {
  c.youtube.forEach(v=>{
    let btn=document.createElement("button");
    btn.className="play-btn";
    btn.textContent="▶ "+v.label;

    let audio=document.createElement("div");
    audio.className="audio";

    let iframe=document.createElement("iframe");
    iframe.dataset.src="https://www.youtube.com/embed/"+v.id;
    audio.appendChild(iframe);

    btn.onclick=()=>{
      document.querySelectorAll(".audio").forEach(a=>{
        a.style.display="none";
        let f=a.querySelector("iframe");
        if(f) f.src="";
      });
      audio.style.display="block";
      iframe.src=iframe.dataset.src;
    };

    div.appendChild(btn);
    div.appendChild(audio);
  });
}

      section.appendChild(div);
    });

    container.appendChild(section);
  });
}

/* ✅ Type filter */
document.getElementById("typeFilter").addEventListener("change",()=>{
  let t=document.getElementById("typeFilter").value;

  document.querySelectorAll(".comp").forEach(c=>{
    c.style.display=(t==="all"||c.dataset.type===t)?"block":"none";
  });

  document.querySelectorAll("details").forEach(section=>{
    let visible=section.querySelector(".comp[style*='block']");
    if(visible){ section.style.display="block"; section.open=true; }
    else section.style.display="none";
  });
});

/* ✅ Raga filter */
document.addEventListener("click",e=>{
  if(e.target.classList.contains("raga-tag")){
    let r=e.target.dataset.raga;

    document.querySelectorAll(".comp").forEach(c=>{
      c.style.display=(c.dataset.raga===r)?"block":"none";
    });

    document.querySelectorAll("details").forEach(section=>{
      let v=section.querySelector(".comp[style*='block']");
      if(v){ section.style.display="block"; section.open=true; }
      else section.style.display="none";
    });

    document.getElementById("typeFilter").value="all";
  }
});

render();

</script>

</body>
</html>
